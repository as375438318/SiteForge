# SiteForge Nginx 站点配置
#
# 路由规则：
#   /api/*           → 反向代理到 NestJS 后端 (app:3000)
#   /media/*         → 静态媒体文件 (只读挂载)
#   /                → 静态站点产物 (/usr/share/nginx/sites/<domain>)

# HTTP → HTTPS 跳转（生产环境启用）
server {
    listen 80;
    server_name _;

    # 健康检查端点保留 HTTP（用于 Docker healthcheck）
    location /health {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 其他请求跳转到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主服务
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # SSL 证书路径（生产环境替换为真实证书）
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ===== API 反向代理 =====
    location /api/ {
        proxy_pass http://app:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ===== 静态媒体文件（只读） =====
    location /media/ {
        alias /usr/share/nginx/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ===== 静态站点托管 =====
    # /sites/<domain>/ 目录下的产物作为站点根目录
    location / {
        root /usr/share/nginx/sites;
        index index.html;
        try_files $uri $uri/ $uri.html =404;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
