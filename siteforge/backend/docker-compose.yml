# SiteForge Docker Compose 部署配置
# 包含 4 个服务：nginx + app + postgres + redis
#
# 启动：docker compose up -d
# 验证：bash scripts/verify.sh
# 备份：bash scripts/backup.sh

services:
  # ============================================================================
  # PostgreSQL 数据库
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: siteforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-siteforge}
      POSTGRES_USER: ${POSTGRES_USER:-siteforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 中设置 POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    # 仅暴露给内网，不对外发布
    networks:
      - siteforge_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-siteforge} -d ${POSTGRES_DB:-siteforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================================
  # Redis 缓存与队列
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: siteforge-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-change-me-redis-password}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - siteforge_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change-me-redis-password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # SiteForge 应用（NestJS 后端）
  # ============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siteforge-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-siteforge}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-siteforge}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-redis-password}@redis:6379/0
      DOMAIN: ${DOMAIN:?请在 .env 中设置 DOMAIN}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:-${DOMAIN}}
      HTTPS_ENABLED: ${HTTPS_ENABLED:-false}
      JWT_SECRET: ${JWT_SECRET:?请在 .env 中设置 JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      LICENSE_STRICT_MODE: ${LICENSE_STRICT_MODE:-true}
      LICENSE_KEY: ${LICENSE_KEY:-}
      LICENSE_RSA_PUBLIC_KEY: ${LICENSE_RSA_PUBLIC_KEY:-}
      LICENSE_RSA_PRIVATE_KEY: ${LICENSE_RSA_PRIVATE_KEY:-}
      LICENSE_EXPIRE_WARN_DAYS: ${LICENSE_EXPIRE_WARN_DAYS:-7}
      MEDIA_DIR: /app/data/media
      SITES_DIR: /app/data/sites
      BACKUP_DIR: /app/data/backups
    volumes:
      - media_data:/app/data/media
      - sites_data:/app/data/sites
      - backup_data:/app/data/backups
    networks:
      - siteforge_net
    # 仅暴露给内网，由 nginx 反代
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================================================
  # Nginx 反向代理 + 静态站点托管
  # ============================================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: siteforge-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - sites_data:/usr/share/nginx/sites:ro
      - media_data:/usr/share/nginx/media:ro
      - admin_dist:/usr/share/nginx/admin:ro
      - nginx_logs:/var/log/nginx
    networks:
      - siteforge_net

networks:
  siteforge_net:
    driver: bridge

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  media_data:
    driver: local
  sites_data:
    driver: local
  backup_data:
    driver: local
  nginx_logs:
    driver: local
  # 管理后台前端静态产物（由前端构建产物挂载；若无需前端可置空）
  admin_dist:
    driver: local
